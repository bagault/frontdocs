name: build-windows-blob

# Builds a self-contained Windows MkDocs sidecar (`frontdocs-mkdocs.exe`) so end
# users on Windows do not need to install Python. Run on a Windows runner because
# PyInstaller does not cross-compile from Linux/macOS.
#
# Trigger: manual dispatch only. The committed binary under bin/win32-x64/
# is treated as the source of truth; rebuild with `gh workflow run` when the
# pinned MkDocs / Material / pymdown-extensions versions change.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: x64

      - name: Install MkDocs + plugins + PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install `
            "mkdocs>=1.6,<2" `
            "mkdocs-material>=9.5,<10" `
            "pymdown-extensions>=10,<11" `
            "pyinstaller>=6.6,<7"

      - name: Write entrypoint
        shell: pwsh
        run: |
          @'
          # Tiny entrypoint that just defers to mkdocs.__main__.
          import sys
          from mkdocs.__main__ import cli
          if __name__ == "__main__":
              sys.exit(cli())
          '@ | Set-Content -Encoding utf8 -Path mkdocs_entry.py

      - name: Build single-file binary
        shell: pwsh
        run: |
          pyinstaller --onefile --name frontdocs-mkdocs `
            --collect-all mkdocs `
            --collect-all mkdocs_material `
            --collect-all pymdownx `
            --collect-all material `
            mkdocs_entry.py

      - name: Smoke test
        shell: pwsh
        run: |
          .\dist\frontdocs-mkdocs.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontdocs-mkdocs-windows-x64
          path: dist/frontdocs-mkdocs.exe
          if-no-files-found: error
