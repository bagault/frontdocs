name: build-mkdocs-blobs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: win32
            arch: x64
            runner: windows-latest
            ext: '.exe'
          - os: linux
            arch: x64
            runner: ubuntu-latest
            ext: ''

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs + plugins + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mkdocs>=1.6,<2" "mkdocs-material>=9.5,<10" "pymdown-extensions>=10,<11" "pyinstaller>=6.6,<7"

      - name: Write entrypoint
        run: |
          cat > mkdocs_entry.py <<'PY'
          import sys
          from mkdocs.__main__ import cli
          if __name__ == "__main__":
              sys.exit(cli())
          PY

      - name: Build single-file binary
        run: |
          pyinstaller --onefile --name frontdocs-mkdocs --collect-all mkdocs --collect-all mkdocs_material --collect-all pymdownx --collect-all material mkdocs_entry.py

      - name: Smoke test
        run: |
          ./dist/frontdocs-mkdocs${{ matrix.ext }} --version

      - name: Rename for release asset naming
        run: |
          mv dist/frontdocs-mkdocs${{ matrix.ext }} dist/frontdocs-mkdocs-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Compute SHA-256 checksum
        run: |
          cd dist
          asset="frontdocs-mkdocs-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
          cat "$asset.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontdocs-mkdocs-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/frontdocs-mkdocs-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
            dist/frontdocs-mkdocs-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256
          if-no-files-found: error
