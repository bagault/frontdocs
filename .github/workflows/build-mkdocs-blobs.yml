name: build-mkdocs-blobs

# Builds self-contained MkDocs sidecars for every supported OS/arch so end
# users do not need to install Python. PyInstaller does not cross-compile,
# so we run a matrix on real runners and upload one artifact per target.
#
# Trigger: manual dispatch only. Re-run when MkDocs / Material /
# pymdown-extensions pins are bumped, then attach the artifacts to the
# matching GitHub release.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: win32
            arch: x64
            runner: windows-latest
            ext: '.exe'
            shell: pwsh
          - os: linux
            arch: x64
            runner: ubuntu-latest
            ext: ''
            shell: bash
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: ''
            shell: bash
          - os: darwin
            arch: x64
            runner: macos-13
            ext: ''
            shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs + plugins + PyInstaller
        shell: ${{ matrix.shell }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mkdocs>=1.6,<2" "mkdocs-material>=9.5,<10" "pymdown-extensions>=10,<11" "pyinstaller>=6.6,<7"

      - name: Write entrypoint (POSIX)
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          cat > mkdocs_entry.py <<'PY'
          import sys
          from mkdocs.__main__ import cli
          if __name__ == "__main__":
              sys.exit(cli())
          PY

      - name: Write entrypoint (Windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          @'
          import sys
          from mkdocs.__main__ import cli
          if __name__ == "__main__":
              sys.exit(cli())
          '@ | Set-Content -Encoding utf8 -Path mkdocs_entry.py

      - name: Build single-file binary
        shell: ${{ matrix.shell }}
        run: |
          pyinstaller --onefile --name frontdocs-mkdocs --collect-all mkdocs --collect-all mkdocs_material --collect-all pymdownx --collect-all material mkdocs_entry.py

      - name: Smoke test
        shell: ${{ matrix.shell }}
        run: |
          ./dist/frontdocs-mkdocs${{ matrix.ext }} --version

      - name: Rename for release asset naming
        shell: ${{ matrix.shell }}
        run: |
          mv dist/frontdocs-mkdocs${{ matrix.ext }} dist/frontdocs-mkdocs-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontdocs-mkdocs-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/frontdocs-mkdocs-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error
